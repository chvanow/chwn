<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Спасибо за покупку! — chwn.ru</title>
  <meta name="theme-color" content="#0b0b0f">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0b0b0f;
      --text: #e2e2e8;
      --text-muted: #9ca3af;
      --accent: #10b981;
      --accent-hover: #059669;
      --radius: 16px;
      --font: 'Inter', system-ui, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      text-align: center;
      line-height: 1.6;
    }
    .container { max-width: 500px; }
    h1 { margin-bottom: 1rem; font-size: 2rem; }
    p { color: var(--text-muted); margin-bottom: 1.5rem; }
    .btn {
      display: inline-block;
      padding: 0.85rem 1.75rem;
      background: var(--accent);
      color: #000;
      border-radius: var(--radius);
      text-decoration: none;
      font-weight: 600;
      transition: background 0.2s;
    }
    .btn:hover { background: var(--accent-hover); }
    .note { font-size: 0.85rem; margin-top: 1rem; }
    .note a { color: var(--accent); }
  </style>
</head>
<body>
  <div class="container">
    <h1>Оплата прошла успешно</h1>
    <p>Спасибо за покупку курса «Канцелярия.Цифра».<br>Письмо с доступом к материалам отправлено на вашу почту.</p>
    <p class="note">Если письмо не пришло в течение 5 минут — проверьте папку «Спам» или напишите на <a href="mailto:vuoo@mail.ru">vuoo@mail.ru</a></p>
    <a href="https://chwn.ru" class="btn">Вернуться на сайт</a>
  </div>
</body>
</html>
