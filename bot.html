<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

<style>
  /* ============================================================
     НАСТРОЙКИ ЦВЕТОВ И СТИЛЕЙ
     ============================================================ */
  :root {
    --primary: #0080A9;
    --primary-hover: #00759A;
    --dark: #0080A9;
    --bg-chat: #F5F7F9;
    --bg-option: #d4e8ee;
    --border-option: #8aa5ad;
    --text-main: #3B3838;
    --text-white: #FFFFFF;
    --shadow: 0 4px 16px rgba(0,0,0,0.08);
    --btn-secondary-bg: #a57a3d62;
    --btn-secondary-hover: #C0965C;
    --btn-secondary-text: #000000;
    --btn-dark-bg: #f3e4cf;
    --btn-dark-hover: #ceab7a;
    --btn-dark-text: #000000;
    --gold-glow: rgba(104, 95, 58, 0.438);
    --btn-rating-bg: #e8e8e8;
    --btn-rating-hover: #C0965C;
    --btn-rating-text: #000000;
    --btn-gray-bg: #6c757d;
    --btn-gray-hover: #343a40;
    --btn-gray-text: #FFFFFF;
    --star-gold: #ffd90098;
    --star-light-gold: #ffe45cbe;
    --star-gray: #999999;
    --star-light-gray: #D3D3D3;
  }

  /* Кнопка открытия чата — ПЛАВНАЯ ПУЛЬСАЦИЯ */
  .bot-toggle-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 90px;
    height: 90px;
    background-color: var(--primary);
    border-radius: 50%;
    box-shadow: 0 8px 25px rgba(0,0,0,0.15), 
                inset 0 2px 4px rgba(255, 255, 255, 0.3);
    cursor: pointer;
    z-index: 2147483647;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.3s, background 0.3s;
    border: none;
    -webkit-tap-highlight-color: transparent;
  }

  .bot-toggle-btn::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    border-radius: 50%;
    background-color: var(--primary);
    z-index: -1;
    animation: pulseOutward 2s cubic-bezier(0.4, 0, 0.2, 1) infinite;
  }

  .bot-toggle-btn:hover { 
    transform: scale(1.05); 
    background: var(--primary-hover);
  }

  .bot-toggle-btn:active {
    transform: scale(0.95);
  }

  .bot-toggle-btn svg { 
    width: 42px; 
    height: 42px; 
    fill: var(--text-white); 
  }

  body.chat-open .bot-toggle-btn::before {
    opacity: 0;
    transform: scale(1) !important;
    transition: opacity 0.5s ease, transform 0.5s ease;
    animation: none;
  }

  @keyframes pulseOutward {
    0% { transform: scale(1); opacity: 0.5; }
    100% { transform: scale(2.8); opacity: 0; }
  }

  /* Окно чата — УВЕЛИЧЕНО НА 15% */
  .chat-window {
    position: fixed;
    bottom: 90px;
    right: 20px;
    width: 460px;
    max-width: calc(100vw - 40px);
    height: 690px;
    max-height: calc(100vh - 100px);
    background: var(--text-white);
    border-radius: 16px;
    box-shadow: var(--shadow);
    z-index: 2147483647;
    display: none;
    flex-direction: column;
    overflow: hidden;
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    animation: slideUp 0.3s ease-out;
  }
  .chat-window.active { display: flex; }

  .chat-header {
    background: var(--dark);
    color: var(--text-white);
    padding: 14px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
  }
  .chat-header h4 { margin: 0; font-size: 15px; font-weight: 600; }
  .chat-close {
    cursor: pointer; font-size: 24px; background: none; border: none;
    color: var(--text-white); opacity: 0.8; transition: opacity 0.2s;
    padding: 4px;
    min-width: 32px;
    min-height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .chat-close:hover { opacity: 1; }

  .chat-messages {
    flex: 1;
    padding: 12px 16px;
    overflow-y: auto;
    background: var(--bg-chat);
    display: flex;
    flex-direction: column;
    gap: 10px;
    scroll-behavior: smooth;
    -webkit-overflow-scrolling: touch;
  }
  .chat-messages::-webkit-scrollbar { width: 6px; }
  .chat-messages::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

  .message {
    max-width: 90%;
    padding: 10px 14px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.5;
    color: var(--text-main);
    animation: messageAppear 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    animation-fill-mode: forwards;
    opacity: 0;
    transform: translateY(10px);
    word-wrap: break-word;
  }
  .message.bot {
    background: var(--text-white);
    align-self: flex-start;
    border-bottom-left-radius: 4px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
  }
  .message.user {
    background: var(--primary);
    color: var(--text-white);
    align-self: flex-end;
    border-bottom-right-radius: 4px;
  }

  .chat-options {
    padding: 12px 16px;
    background: var(--text-white);
    border-top: 1px solid #eef2f5;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    min-height: auto;
    align-items: center;
    flex-shrink: 0;
  }

  .option-btn {
    background: var(--bg-option);
    border: 1px solid var(--border-option);
    padding: 10px 14px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    color: var(--text-main);
    animation: buttonFadeIn 0.4s ease-out;
    animation-fill-mode: forwards;
    opacity: 0;
    transform: translateY(8px);
    text-align: center;
    white-space: normal !important;
    word-wrap: break-word;
    overflow-wrap: break-word;
    min-height: 40px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    -webkit-tap-highlight-color: transparent;
  }
  .option-btn:hover {
    background: var(--primary);
    color: var(--text-white);
    border-color: var(--primary);
    transform: translateY(-2px) scale(1.02);
    box-shadow: 0 2px 8px rgba(16, 189, 153, 0.2);
  }
  .option-btn:active { transform: scale(0.98); }

  .option-btn-secondary {
    background: var(--btn-secondary-bg) !important;
    border: 1px solid #718096 !important;
    color: var(--btn-secondary-text) !important;
    font-weight: 600 !important;
  }
  .option-btn-secondary:hover {
    background: var(--btn-secondary-hover) !important;
    border-color: var(--btn-secondary-hover) !important;
    color: #2D3748 !important;
    transform: translateY(-2px) scale(1.05);
    box-shadow: 0 3px 12px var(--gold-glow), 
                0 0 15px rgba(244, 208, 63, 0.25);
  }

  .option-btn-outline {
    background: var(--btn-dark-bg) !important;
    border: 2px solid #2D3748 !important;
    color: var(--btn-dark-text) !important;
    font-weight: 600 !important;
  }
  .option-btn-outline:hover {
    background: var(--btn-dark-hover) !important;
    border-color: var(--btn-dark-hover) !important;
    color: #2D3748 !important;
    transform: translateY(-2px) scale(1.05);
    box-shadow: 0 3px 12px var(--gold-glow), 
                0 0 15px rgba(244, 208, 63, 0.25),
                inset 0 0 6px rgba(255, 255, 255, 0.2);
  }

  .option-btn-rating {
    background: var(--btn-rating-bg) !important;
    border: 1px solid #999999 !important;
    color: var(--btn-rating-text) !important;
    font-weight: 600 !important;
  }
  .option-btn-rating:hover {
    background: var(--btn-rating-hover) !important;
    border-color: var(--btn-rating-hover) !important;
    color: #333333 !important;
    transform: translateY(-2px) scale(1.05);
    box-shadow: 0 6px 20px var(--gold-glow), 
                0 0 30px rgba(244, 208, 63, 0.4);
  }

  /* === НОВЫЙ СТИЛЬ: СЕРАЯ КНОПКА === */ 
  .option-btn-gray {
    background: var(--btn-gray-bg) !important;
    border: 1px solid var(--btn-gray-bg) !important;
    color: var(--btn-gray-text) !important;
    font-weight: 600 !important;
  }
  .option-btn-gray:hover {
    background: var(--btn-gray-hover) !important;
    border-color: var(--btn-gray-hover) !important;
    color: var(--btn-gray-text) !important;
    transform: translateY(-2px) scale(1.02);
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }

  .option-btn-external {
    background: rgba(0, 168, 150, 0.1) !important;
    color: var(--primary) !important;
    border: 2px solid var(--primary) !important;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-weight: 600;
    padding: 10px 16px !important;
    transition: all 0.3s ease;
    cursor: pointer;
  }
  .option-btn-external:hover {
    background: var(--primary) !important;
    color: white !important;
    box-shadow: 0 4px 15px rgba(0, 168, 150, 0.4);
  }

  /* === ЗВЁЗДЫ ДЛЯ РЕЙТИНГА === */
  .rating-stars {
    display: flex !important;
    gap: 8px !important;
    justify-content: center !important;
    padding: 12px 0 !important;
    margin: 8px 0 !important;
  }
  
  .rating-star {
    width: 36px !important;
    height: 36px !important;
    cursor: pointer !important;
    transition: transform 0.2s ease !important;
    user-select: none !important;
  }
  
  .rating-star svg {
    width: 100% !important;
    height: 100% !important;
    fill: var(--star-light-gray) !important;
    stroke: var(--star-gray) !important;
    stroke-width: 1.5 !important;
    transition: fill 0.2s ease, stroke 0.2s ease, filter 0.2s ease !important;
  }
  
  .rating-star:hover svg,
  .rating-star.active svg {
    fill: var(--star-gold) !important;
    stroke: var(--star-gold) !important;
    filter: drop-shadow(0 0 6px rgba(255, 215, 0, 0.6)) !important;
  }
  
  .rating-star:hover {
    transform: scale(1.15) !important;
  }

  /* Иконка внешней ссылки */
  .external-link-icon {
    width: 16px;
    height: 16px;
    margin-right: 6px;
    vertical-align: middle;
    flex-shrink: 0;
  }

  /* Анимации */
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes messageAppear {
    0% { opacity: 0; transform: translateY(15px) scale(0.95); }
    60% { transform: translateY(-3px) scale(1.02); }
    100% { opacity: 1; transform: translateY(0) scale(1); }
  }
  @keyframes buttonFadeIn {
    0% { opacity: 0; transform: translateY(8px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  /* === МОБИЛЬНАЯ АДАПТАЦИЯ === */
  @media (max-width: 480px) {
    /* Кнопка открытия чата — УВЕЛИЧЕНА НА 15% */
    .bot-toggle-btn {
      bottom: 16px !important;
      right: 16px !important;
      width: 81px !important; /* 70px * 1.15 = 80.5 ≈ 81px */
      height: 81px !important;
    }
    .bot-toggle-btn::before {
      animation-duration: 2.5s !important;
    }
    .bot-toggle-btn svg {
      width: 38px !important; /* Пропорционально увеличена */
      height: 38px !important;
    }
    
    /* Окно чата — ИСПРАВЛЕНО ПОЗИЦИОНИРОВАНИЕ */
    .chat-window {
      width: calc(100vw - 32px) !important;
      max-width: none !important;
      bottom: 95px !important; /* Увеличен отступ снизу */
      right: 16px !important;
      left: 16px !important;
      height: calc(100vh - 120px) !important; /* Уменьшена высота чтобы не заезжать */
      max-height: none !important;
      border-radius: 12px !important;
      /* Добавлены отступы для safe area */
      padding-top: env(safe-area-inset-top);
    }
    
    /* Для браузеров с поддержкой dvh */
    @supports (height: 100dvh) {
      .chat-window {
        height: calc(100dvh - 120px) !important;
      }
    }
    
    /* Заголовок чата */
    .chat-header {
      padding: 12px 14px !important;
      padding-top: calc(12px + env(safe-area-inset-top)) !important;
    }
    .chat-header h4 {
      font-size: 14px !important;
    }
    .chat-close {
      font-size: 22px !important;
      padding: 4px !important;
      min-width: 28px !important;
      min-height: 28px !important;
    }
    
    /* Область сообщений */
    .chat-messages {
      padding: 10px 12px !important;
      gap: 8px !important;
    }
    
    /* Сообщения */
    .message {
      max-width: 92% !important;
      padding: 9px 12px !important;
      font-size: 13px !important;
      border-radius: 14px !important;
    }
    
    /* Область кнопок */
    .chat-options {
      padding: 10px 12px !important;
      gap: 6px !important;
      padding-bottom: calc(10px + env(safe-area-inset-bottom)) !important;
    }
    
    /* Кнопки */
    .option-btn {
      padding: 9px 12px !important;
      font-size: 13px !important;
      min-height: 38px !important;
      min-width: 38px !important;
      border-radius: 18px !important;
      white-space: normal !important;
      word-wrap: break-word;
    }
    
    /* Звезды рейтинга */
    .rating-star {
      width: 34px !important;
      height: 34px !important;
    }
  }
  
  /* Очень маленькие экраны */
  @media (max-width: 360px) {
    .chat-window {
      bottom: 90px !important;
      height: calc(100vh - 110px) !important;
    }
    .option-btn {
      padding: 8px 10px !important;
      font-size: 12px !important;
      min-height: 36px !important;
    }
  }
  
  /* Блокировка прокрутки body при открытом чате */
  body.chat-open {
    overflow: hidden !important;
    position: fixed !important;
    width: 100% !important;
  }
</style>

      text: "1. Вы можете оставить обращение через Форму обратной связи на нашем сайте <b>deti.gov.ru</b>\n \n2. Написать нам на электронную почту: <b>obr@deti.gov.ru</b>\n \n3. Также вы можете обратиться к нам по телефону:<b>+7(495)132-55-05</b> Голосовой помощник подскажет, как поступить в вашей ситуации.\n \n4. Направить письменное обращение можно по адресу: <b>125993, г. Москва, ГСП-3, Миусская пл., д.7</b>",

    "ochered_zhili": {
      text: "1. Проводится проверка и обновление документов.\nВозможен повторный запрос документов: о составе семьи, регистрации, отсутствии другого жилья, а также иные сведения.\n \n2. Предлагается конкретное жилое помещение.\nЕму сообщают адрес, площадь, количество комнат и другие характеристики жилья. Предлагаемое помещение должно соответствовать требованиям закона: быть изолированным, пригодным для постоянного проживания, благоустроенным и соответствовать нормам предоставления площади на человека.\n \n3. Принимается решение о предоставлении жилого помещения.\nСначала проверяется, что гражданин по-прежнему имеет право на жилье: не изменились ли условия (например, не улучшились ли жилищные условия, не утрачены ли основания нуждаемости). После этого выносится официальное решение о предоставлении жилого помещения.\n \n4. Заключается договор социального найма.\nПосле подтверждения всех данных между гражданином (нанимателем) и муниципалитетом (наймодателем) заключается договор.\n \n5. После подписания договора гражданин получает право вселиться в жилое помещение и оформить регистрацию по месту жительства.",

        { text: "В главное меню", next: "start", class: "secondary" },

      ]
    },

      text: "Выберите действие..",

    "kuda_obr_prav_zhili": {
      text: "Вы можете обратиться в..",

        { text: "Органы прокуратуры", next: "obr_prokur_zhili" },
        { text: "Суд", next: "obr_sud_zhili" },
        { text: "Институт уполномоченных по правам ребенка", next: "obr_pav_reb_zhili" },

        { text: "Назад", next: "otkaz_uchet_zhili", class: "secondary" },

    "obr_pav_reb_zhili": {
      text: "Уполномоченный при Президенте Российской Федерации по правам ребенка не обладает полномочиями по предоставлению жилья, постановке на жилищный учет или изменению решений органов власти в жилищной сфере.\n \nВместе с тем в его компетенцию входит защита прав и законных интересов несовершеннолетних, включая право на жилище, в том числе путем рассмотрения обращений, запроса информации у государственных органов для инициирования проверок по фактам возможных нарушений прав ребенка. В случае несогласия с отказом в постановке на жилищный учет заявитель вправе обратиться к Уполномоченному, однако решения о предоставлении жилья принимаются исключительно органами местного самоуправления.\n \nНаправить обращение в адрес Уполномоченного через Форму обратной связи на официальном сайте <b>deti.gov.ru</b> или на электронную почту <b>obr@deti.gov.ru</b> по кнопкам ниже:",
      options: [
        { text: "Оставить обращение на сайте", next: "obrashenie", class: "gray" },
        { text: "Направить электронное письмо", next: "mail_obr", class: "gray" },

        { text: "В главное меню", next: "start", class: "secondary" },

      ]
    },
    "obr_sud_zhili": {
      text: "Порядок обжалования решений, действий (бездействия) органов государственной власти, органов местного самоуправления, иных органов, организаций, наделенных отдельными государственными или иными публичными полномочиями, должностных лиц, государственных и муниципальных служащих определен в главе 22 Кодекса административного судопроизводства Российской Федерации.\n \nСогласно ст. 218 КАС РФ граждане могут обратиться в суд с требованиями об оспаривании решений, действий (бездействия) органа государственной власти, если полагают, что нарушены их права, свободы и законные интересы, созданы препятствия к осуществлению их прав, свобод и реализации законных интересов или на них незаконно возложены какие-либо обязанности.\n \nАдминистративное исковое заявление может быть подано в суд в течение трех месяцев со дня, когда гражданину стало известно о нарушении его прав, свобод и законных интересов (ч. 1 ст. 219 КАС РФ).\n \nВместе с тем пропуск установленного срока обращения в суд не является основанием для отказа в принятии административного искового заявления к производству суда (ч. 5 ст. 219 КАС РФ).\n \nВ соответствии с ч. 1 ст. 95 КАС РФ лицам, пропустившим установленный процессуальный срок по причинам, признанным судом уважительными, пропущенный срок может быть восстановлен",

        { text: "", next: "" },       
        { text: "Назад", next: "kuda_obr_prav_zhili", class: "secondary" },

    "7proekt_doc_zhili": {
      text: "Выберите документ:\n \n<b>Документ 1:</b> Заявление о принятии на учет в качестве нуждающегося в жилом помещении.\n \n<b>Документ 2:</b> Административное исковое заявление о признании незаконным решения об отказе в постановке на жилищный учет и возложении обязанности устранить допущенное нарушение.\n \n<b>Документ 3:</b> Жалоба на нарушение жилищных прав в органы прокуратуры.\n \n<b>Все документы:</b> папка со всеми документами.",

    "obr_prokur_zhili": {
      text: "Органы прокуратуры осуществляют надзор за соблюдением прав и свобод граждан, включая жилищные права несовершеннолетних, и рассматривают обращения о нарушениях, в том числе при отказе в постановке на жилищный учет.\n \nОбращение в органы прокуратуры можно подать через систему территориальных подразделений: в районную или городскую прокуратуру по месту жительства либо по месту нахождения органа, принявшего решение об отказе в постановке на жилищный учет.\n \nЕсли вопрос требует дополнительной проверки, он может быть направлен в прокуратуру субъекта Российской Федерации.\n \nНадзор за нижестоящими прокуратурами осуществляет <b>Генеральная прокуратура Российской Федерации</b>, куда также можно обратиться напрямую через официальный сайт по кнопке ниже:",

    "na_kak_rasch_zhili": {
      text: "По договору социального найма предоставляется жилое помещение государственного или муниципального жилищного фонда: это может быть квартира, комната или жилой дом (часть дома). Конкретный размер площади на человека зависит от региона, поэтому такие подробности необходимо выяснять по месту проживания.",

    "kogda_poluch_zhili": {
      text: "Конкретный срок предоставления жилого помещения заранее определить затруднительно, поскольку он зависит от даты постановки на жилищный учет, категории учета, очередности, а также от наличия жилых помещений в соответствующем жилищном фонде.\nПри длительном отсутствии решения либо наличии признаков нарушения жилищных прав следует направить в орган местного самоуправления.",

    "uskor_poluch_zhili": {
      text: "Срок предоставления жилого помещения зависит от оснований постановки на жилищный учет, очередности, а также от наличия жилищного фонда. Вместе с тем в отдельных случаях законодательством предусмотрены механизмы внеочередного обеспечения жильем.\nПри длительном отсутствии решения либо наличии признаков нарушения жилищных прав следует направить в орган местного самоуправления.",

    "1vneoch_pred_zhili": {
      text: "Вне очереди жилые помещения по договорам социального найма предоставляются:\n \n●	гражданам, являющимся нанимателями жилых помещений по договорам социального найма или собственниками жилых помещений, если их единственное жилое помещение признано в установленном порядке непригодным для проживания и не подлежит ремонту или реконструкции; при этом собственникам жилые помещения предоставляются вне очереди только если не принято решение об изъятии земельного участка или многоквартирного дома для государственных или муниципальных нужд;\n● гражданам, страдающим тяжелыми формами хронических заболеваний, включенных в соответствующий в перечень приказом Минздрава России от 29.11.2012 № 987н “Об утверждении перечня тяжелых форм хронических заболеваний, при которых невозможно совместное проживание граждан в одной квартире”",
      options: [
        { text: "Куда обращаться с заявлением?", next: "5kuda_obr_zaya_zhili" },

    "5kuda_obr_zaya_zhili": {
      text: "Подать заявление можно через МФЦ или орган местного самоуправления по месту жительства. Решение о принятии на учет (или об отказе) должны принять в течение 30 дней.\n \nЧто чаще всего нужно представить:\n● заявление, подписанное членами семьи;\n● паспорта или свидетельства о рождении членов семьи;\n● выписка из домовой книги – о количестве проживающих;\n● справка из Росреестра о наличии или об отсутствии недвижимости;\n● справка о доходах – от трудоспособных.\nДополнительно по ситуации прикладывают справку о признании дома аварийным или медицинскую справку о состоянии здоровья.\n \n<b>Обратите внимание:</b> перечень актуальных документов и требования к их оформлению могут отличаться в зависимости от региона и конкретных оснований обращения. Рекомендуем уточнять актуальный список документов непосредственно в органах местного самоуправления по месту жительства или в МФЦ перед подачей заявления.",

    "5proekt_doc_zhili": {
      text: "Выберите документ:\n \n<b>Документ 1:</b> Заявление о принятии на учет в качестве нуждающегося в жилом помещении.\n \n<b>Документ 2:</b> Административное исковое заявление о признании незаконным решения об отказе в постановке на жилищный учет и возложении обязанности устранить допущенное нарушение.\n \n<b>Документ 3:</b> Жалоба на нарушение жилищных прав в органы прокуратуры.\n \n<b>Все документы:</b> папка со всеми документами.",

    "kak_nom_och_zhili": {
      text: "Для проверки информации предусмотрено несколько способов: онлайн и офлайн. Предлагаем пошаговую инструкцию по каждому из них.\n \n<b>На портале «Госуслуги»</b>\nАвторизуйтесь в аккаунте. В поисковой строке введите «Проверить очередь на жилье». Виртуальный помощник предложит несколько услуг. Выберите «Получение жилья по договору социального найма».\nЕсли у вас уже подано заявление, то система перенаправит на страницу оказания услуги. Там указана вся необходимая информация, включая номер в очереди на жилье.\n \n<b>Через МФЦ</b>\nЛично обратитесь в МФЦ с паспортом и попросите представить сведения о номере в очереди. Услуга бесплатная. Сотрудник проверит данные и выдаст справку с нужной информацией. Жителям Москвы нужно обратиться в центр «Мои документы».\n \n<b>В органах местного самоуправления</b>\nВ администрацию можно прийти лично или прислать заказное письмо по почте. Также разрешено отправить представителя с нотариальной доверенностью. В некоторых регионах информация об очередях на жилье публикуется на официальном сайте органов местного самоуправления. Чтобы узнать, есть ли в вашем регионе такой сайт, позвоните в администрацию и уточните у сотрудников.",

      text: "Основаниями для предоставления жилого помещения по договору социального найма являются признание гражданина малоимущим и нуждающимся в жилом помещении. Малоимущей может считаться семья, в которой доход на каждого члена семьи (среднедушевой доход) меньше, чем прожиточный минимум в регионе проживания. Чтобы понять, что ваша семья малоимущая, сложите все официальные доходы, а потом разделите на количество людей. Если сумма будет меньше регионального прожиточного минимума, то вы можете претендовать на жилье по социальному найму.\n \nГражданин может быть признан нуждающимся в жилье, если он:\n1. Вообще не имеет своего жилья и не пользуется жильем по договору социального найма. То есть у него нет квартиры или дома в собственности и нет жилья, предоставленного государством.\n2. Имеет жилье, но его не хватает по площади. Например, если на каждого члена семьи приходится меньше площади, чем установлено учетной нормой в регионе.\n3. Живет в помещении, которое не подходит для проживания. Например, если жилье признано аварийным, непригодным или не соответствует санитарным и техническим требованиям.\n4. Живет в одной квартире с несколькими семьями, и в семье есть тяжелобольной человек, с которым совместное проживание невозможно по медицинским показаниям. При этом у семьи не должно быть другого подходящего жилья.\n \n<b>Важно:</b> Федеральное законодательство не устанавливает минимального срока проживания в регионе для постановки на жилищный учет. Однако в некоторых субъектах РФ такое требование установлено региональными нормативными актами. В частности, в Москве и Санкт-Петербурге необходимо 10 лет постоянного проживания на законных основаниях.",

    "kuda_obr_zaya_zhili": {
      text: "Подать заявление можно через МФЦ или орган местного самоуправления по месту жительства. Решение о принятии на учет (или об отказе) должны принять в течение 30 дней.\n \nЧто чаще всего нужно представить:\n● заявление, подписанное членами семьи;\n● паспорта или свидетельства о рождении членов семьи;\n● выписка из домовой книги – о количестве проживающих;\n● справка из Росреестра о наличии или об отсутствии недвижимости;\n● справка о доходах – от трудоспособных.\nДополнительно по ситуации прикладывают справку о признании дома аварийным или медицинскую справку о состоянии здоровья.\n \n<b>Обратите внимание:</b> перечень актуальных документов и требования к их оформлению могут отличаться в зависимости от региона и конкретных оснований обращения. Рекомендуем уточнять актуальный список документов непосредственно в органах местного самоуправления по месту жительства или в МФЦ перед подачей заявления.",

    "raz_babot_in_ali": {
      text: "Настоящий раздел адресован работодателям, а также иным лицам и организациям, выплачивающим должнику заработную плату, пенсию, стипендию или иные периодические платежи.",

    "trud_plat_pred_ali": {
      text: "Порядок действий, если у Вас трудоустроен (или Вам выплачивает доход) плательщик алиментов.\n \nПри поступлении исполнительного документа (исполнительного листа, судебного приказа, нотариально удостоверенного соглашения об уплате алиментов или постановления судебного пристава-исполнителя) Вы обязаны:\n• со дня получения документа удерживать алименты из заработной платы и иных доходов работника в установленном размере;\n• перечислять удержанные суммы взыскателю (или на депозитный счёт подразделения ФССП) в трёхдневный срок со дня выплаты дохода; расходы на перевод несёт должник;\n• соблюдать предельный размер удержаний — при взыскании алиментов на несовершеннолетних детей он может достигать 70% заработка.\n \nРекомендуем сверять работников с реестром должников по алиментам на <b>сайте ФССП</b>.\n \nПри увольнении работника-должника (а также при ином прекращении выплат) Вы обязаны:\n• в трёхдневный срок сообщить судебному приставу-исполнителю и взыскателю об увольнении должника, а также о новом месте его работы или жительства, если оно Вам известно (статья 111 Семейного кодекса РФ);\n• не позднее дня, следующего за днём увольнения, возвратить исполнительный документ в подразделение ФССП с отметкой о произведённых удержаниях и периоде взыскания (статья 98 Федерального закона «Об исполнительном производстве»).\n \nНеисполнение этих обязанностей, а равно несвоевременное удержание или перечисление алиментов влечёт административную ответственность, предусмотренную ст. 17.14 КоАП РФ.",

    "reestr_dolzh_ali": {
      text: "С 25 мая 2025 года Федеральная служба судебных приставов ведёт общедоступный цифровой реестр должников по алиментам (Федеральный закон от 29.05.2024 № 114-ФЗ). Реестр размещён на <b>официальном сайте ФССП</b> в составе Банка данных исполнительных производств. Сервис бесплатный, для поиска достаточно знать фамилию, имя, отчество и дату рождения лица.\n \nВ реестр включаются только злостные неплательщики — лица, в отношении которых:\n• вынесено постановление о привлечении к административной ответственности по статье 5.35.1 КоАП РФ;\n• имеется судимость по статье 157 УК РФ за неуплату средств на содержание детей;\n• объявлен розыск в связи с уклонением от уплаты алиментов.\n \nРеестр охватывает задолженность по алиментам несовершеннолетним детям, нетрудоспособным совершеннолетним детям и нетрудоспособным родителям. С его помощью взыскатель может проверить, числится ли должник в реестре, а работодатель убедиться в наличии у работника алиментных обязательств.",

    "notar_sogl_ali": {
      text: "Нотариально удостоверенное соглашение об уплате алиментов имеет силу исполнительного листа (статья 100 Семейного кодекса РФ). Для принудительного исполнения <b>не требуется обращаться в суд</b>.\n \nВы можете:\n1. Направить соглашение по месту работы должника (в бухгалтерию) с заявлением об удержании алиментов.\n2. Предъявить его в подразделение ФССП по месту жительства должника или месту нахождения его имущества, написав заявление о возбуждении исполнительного производства.\n \nК заявлению приложите: оригинал соглашения, копию паспорта, свидетельство о рождении ребёнка.\n \nЕсли должник оспаривает соглашение или его условия, вопрос решается в суде (исковое производство).",

    "dop_lish_rod_prav": {
      text: "Лишение родительских прав за неуплату алиментов.\n \nСистематическое злостное уклонение от уплаты алиментов может служить основанием для лишения родительских прав в соответствии со статьей 69 Семейного кодекса РФ.\n \nИсковое заявление о лишении родительских прав подается в районный суд. Участие прокурора и органа опеки и попечительства в рассмотрении дела обязательно. При этом лишение родительских прав не освобождает родителя от обязанности содержать своего ребенка (пункт 2 статьи 71 СК РФ).",
      options: [
        { text: "", next: "" },       
        { text: "Назад", next: "dop_info_ali", class: "secondary" },

    "dop_ali_18": {
      text: "Алименты на совершеннолетнего ребенка.\n \nПо общему правилу алиментные обязательства родителей прекращаются по достижении ребенком совершеннолетия. Исключение составляют случаи, когда совершеннолетний ребенок является нетрудоспособным (инвалид I, II группы) и нуждается в материальной помощи. В таких случаях алименты могут быть взысканы через суд.\n \nДля студентов очной формы обучения, достигших 18 лет, законодательством не предусмотрена автоматическая обязанность родителей по уплате алиментов. Вопрос о выплате алиментов совершеннолетним детям, обучающимся в образовательных организациях, может быть решен только по соглашению сторон.",
      options: [

        { text: "Назад", next: "dop_info_ali", class: "secondary" },
        { text: "В главное меню", next: "start", class: "secondary" }
      ]

    "dop_index": {
      text: "Индексация алиментов, установленных в твердой денежной сумме.\n \nАлименты, взыскиваемые по решению суда в твердой денежной сумме, подлежат индексации пропорционально росту величины прожиточного минимума, установленной в соответствующем субъекте Российской Федерации или в целом по Российской Федерации. Размер алиментов в целях индексации устанавливается судом кратным величине прожиточного минимума или в виде доли от нее.\n \nОбязанность по индексации возлагается на работодателя должника (если исполнительный лист направлен по месту работы) либо на судебного пристава-исполнителя. Если индексация не производится, Вы вправе подать жалобу старшему судебному приставу или обратиться в суд.",
      options: [
        { text: "", next: "" },       
        { text: "Назад", next: "dop_info_ali", class: "secondary" },
        { text: "В главное меню", next: "start", class: "secondary" }
      ]
    },
    "dop_bankr": {
      text: "Банкротство и алиментные обязательства.\n \nПроцедура банкротства не освобождает должника от исполнения алиментных обязательств. Задолженность по алиментам не подлежит списанию по итогам процедуры банкротства, относится к текущим платежам и имеет приоритет перед иными требованиями кредиторов.",
      options: [
        { text: "", next: "" },       
        { text: "Назад", next: "dop_info_ali", class: "secondary" },
        { text: "В главное меню", next: "start", class: "secondary" }
      ]
    },
    "dop_mer_dolzh": {
      text: "Меры принудительного исполнения и меры ответственности, которые могут быть применены к должнику по алиментам:\n \n• Обращение взыскания на денежные средства на счетах и имущество должника.\n• Временное ограничение на выезд из Российской Федерации.\n• Временное ограничение на пользование специальным правом (правом управления транспортным средством).\n• Исполнительский сбор (12% от суммы задолженности, но не менее 2000 рублей для физических лиц).\n• Административная ответственность по статье 5.35.1 КоАП РФ за неуплату средств на содержание детей без уважительных причин, если эти действия не содержат уголовно наказуемого деяния.\n• Уголовная ответственность по статье 157 УК РФ за неуплату средств на содержание детей, совершенную неоднократно.\n• Объявление должника и его имущества в розыск.\n• Обращение взыскания на периодические выплаты (доходы, пособия).\n• Внесение сведений о должнике в реестр должников по алиментам — общедоступный реестр ФССП (ведётся с 25 мая 2025 года), в который включаются лица, привлечённые к административной (статья 5.35.1 КоАП РФ) или уголовной (статья 157 УК РФ) ответственности либо объявленные в розыск. Проверка доступна по фамилии, имени и отчеству на сайте ФССП.\n \n<b>Бесплатная юридическая помощь (БЮП):</b>\nВ соответствии с Федеральным законом «О бесплатной юридической помощи в РФ» вы имеете право на квалифицированную бесплатную помощь по делам о взыскании алиментов (консультации, составление заявлений, представительство в суде). Контакты адвокатов вашего региона, работающих в системе БЮП, – на сайте Федеральной палаты адвокатов РФ или в региональной адвокатской палате.\n \nТакже за более подробной информацией Вы можете обратиться к судебному приставу-исполнителю. Записаться на личный прием или подать заявление можно на официальном сайте <b>Федеральной службы судебных приставов</b> или с помощью <b>портала Госуслуг</b>.",

    "dop_prav_dolzh": {
      text: "Основные права должника в рамках исполнительного производства о взыскании алиментов:\n \n• Право на обращение в суд с иском об изменении размера алиментов при изменении материального или семейного положения.\n• Право на обращение в суд с заявлением о предоставлении отсрочки или рассрочки исполнения судебного акта.\n• Право на обжалование постановления судебного пристава-исполнителя о расчете задолженности по алиментам.\n• Право на обжалование действий (бездействия) судебного пристава-исполнителя.\n• Право на заключение нотариально удостоверенного соглашения об уплате алиментов.\n• Право на обращение в суд с заявлением о признании банкротом (при этом задолженность по алиментам не подлежит списанию).\n• Право на оспаривание отцовства в судебном порядке.\n \nВнимание: получение информации по телефону в ФССП России ограничено. Рекомендуется направлять письменные обращения.",
      options: [
        { text: "Перейти на сайт ФССП России", next: "fssp", class: "gray" },
        { text: "", next: "" },       
        { text: "Назад", next: "dop_info_ali", class: "secondary" },
        { text: "В главное меню", next: "start", class: "secondary" }
      ]
    },
    "vos_v_rodprav_ali": {
      text: "Восстановление в родительских правах при наличии задолженности по алиментам.\n \nВосстановление в родительских правах возможно исключительно в судебном порядке. Наличие задолженности по уплате алиментов не является безусловным препятствием для восстановления в правах, однако суд при рассмотрении дела оценивает причины возникновения задолженности, добросовестность родителя и его действительные намерения по исполнению родительских обязанностей.\n \nДля получения квалифицированной юридической помощи при подготовке искового заявления и представлении Ваших интересов в суде рекомендуем обратиться к Уполномоченному при Президенте Российской Федерации по правам ребенка. Вы можете направить обращение в его адрес или в аппарат уполномоченного по правам ребенка в Вашем регионе.\n \n• Официальный сайт Уполномоченного при Президенте Российской Федерации по правам ребенка: <b>deti.gov.ru</b>\n• На указанном сайте также размещены контакты <b>региональных уполномоченных по правам ребенка</b> и функционирует интернет-приемная для подачи обращений.\n \nОбращение должно содержать: подробное изложение ситуации, сведения о наличии задолженности по алиментам и ее причинах, просьбу о содействии в восстановлении родительских прав. К обращению рекомендуется приложить копии следующих документов: решение суда о лишении родительских прав, справка о задолженности по алиментам, документы, подтверждающие попытки уплаты алиментов, медицинские и иные документы, свидетельствующие об изменении обстоятельств.",
      options: [
        { text: "Перейти к списку региональных Уполномоченных", next: "reg_upolnomch", class: "gray" },
        { text: "Оставить обращение на сайте deti.gov.ru", next: "obrashenie", class: "gray" },

    "vzaim_upl_pristav": {
      text: "Взаимодействие с судебным приставом-исполнителем.\n \nРекомендуется своевременно информировать судебного пристава-исполнителя о месте работы, доходах и имущественном положении. При образовании задолженности судебный пристав-исполнитель вправе вынести постановление о взыскании исполнительского сбора (12% от суммы задолженности, но не менее 2000 рублей) и применить меры принудительного исполнения.\n \nЕсли Вы не согласны с постановлением о расчете задолженности, его можно обжаловать:\n• вышестоящему должностному лицу — начальнику отдела — старшему судебному приставу (жалоба подается через канцелярию, почтовым отправлением или через <b>портал Госуслуг</b>);\n• в районный суд по месту нахождения отдела судебных приставов (в порядке административного судопроизводства).",
      options: [
        { text: "Перейти на сайт портала Госуслуг", next: "gos_uslugi", class: "gray" }, 
        { text: "Перейти к образцам и шаблонам обращений (жалоб)", next: "obraz_ali", class: "gray" },

    },
    "narush_upl_pristav": {
      text: "Защита прав должника при нарушении их судебным приставом-исполнителем.\n \nВы вправе обжаловать действия (бездействие) судебного пристава-исполнителя:\n• вышестоящему должностному лицу — начальнику отдела — старшему судебному приставу (жалоба подается через канцелярию, почтовым отправлением или через портал Госуслуг);\n• в органы прокуратуры;\n• в районный суд по месту нахождения отдела судебных приставов (в порядке административного судопроизводства).\n \nОбращаем внимание: информация справочного характера по телефону в ФССП России не предоставляется.",
      options: [ 
        { text: "Перейти на сайт ФССП России", next: "fssp_priem", class: "gray" },
        { text: "Перейти на сайт Генеральной прокуратуры РФ", next: "genproc", class: "gray" },
        { text: "Перейти на сайт портала Госуслуг", next: "gos_uslugi", class: "gray" },
        { text: "Перейти к образцам и шаблонам обращений (жалоб)", next: "obraz_ali", class: "gray" },
        { text: "", next: "" },      
        { text: "Назад", next: "upl_pristav", class: "secondary" },
        { text: "В главное меню", next: "start", class: "secondary" }
      ]
    },
    "um_razm_ali_upl_pristav": {
      text: "Уменьшение размера алиментов.\n \nВы вправе обратиться в суд с иском об уменьшении размера алиментов при изменении материального или семейного положения (рождение других детей, утрата работы, тяжелое заболевание, установление инвалидности и т.п.).\n \nСущественное условие: сам по себе факт увольнения с работы не освобождает от обязанности по уплате алиментов. Только суд вправе изменить размер алиментов, подлежащих уплате.",
      options: [      
        { text: "Назад", next: "upl_pristav", class: "secondary" },
        { text: "В главное меню", next: "start", class: "secondary" }
      ]
    },
    "otsroch_upl_pristav": {
      text: "Отсрочка или рассрочка исполнения судебного решения о взыскании алиментов.\n \nВы вправе обратиться в суд с заявлением о предоставлении отсрочки или рассрочки исполнения решения суда. Также возможно заключение нотариально удостоверенного соглашения с взыскателем о порядке погашения образовавшейся задолженности.",
      options: [       
        { text: "Назад", next: "upl_pristav", class: "secondary" },
        { text: "В главное меню", next: "start", class: "secondary" }
      ]
    },
    "otcov_upl_pristav": {
      text: "Оспаривание отцовства.\n \nЕсли Вы сомневаетесь в своем отцовстве, Вы вправе обратиться в суд с иском об оспаривании отцовства. До вступления решения суда в законную силу и аннулирования записи об отце в органах ЗАГС обязанность по уплате алиментов сохраняется.",
      options: [      
        { text: "Назад", next: "upl_pristav", class: "secondary" },
        { text: "В главное меню", next: "start", class: "secondary" }
      ]
    },
    "perep_upl_pristav": {
      text: "Переплата по алиментным обязательствам.\n \nВ случае образования переплаты возможен ее зачет в счет будущих платежей. Такой зачет допускается только по взаимному соглашению сторон или на основании решения суда. Рекомендуется в письменной форме зафиксировать факт переплаты и достигнутые договоренности.",
      options: [      
        { text: "Назад", next: "upl_pristav", class: "secondary" },
        { text: "В главное меню", next: "start", class: "secondary" }
      ]
    },
    "upl_buh": {
      text: "Выплата алиментов через бухгалтерию работодателя.\n \nПри удержании алиментов из заработной платы Вы обязаны своевременно уведомлять работодателя об изменении места работы с указанием ИНН новой организации.\n \nВ случае изменения обстоятельств, влияющих на размер алиментов, Вы вправе обратиться в суд с иском об изменении размера алиментов. Исковое заявление подается в мировой суд (при отсутствии спора об отцовстве/материнстве) или в районный суд по месту жительства ответчика (получателя алиментов).",
      options: [      
        { text: "Назад", next: "resh_sud_vipl_ali", class: "secondary" },
        { text: "В главное меню", next: "start", class: "secondary" }
      ]
    },
    "dobrov_vipl_ali": {
      text: "Рекомендуем заключить нотариально удостоверенное соглашение об уплате алиментов.\n \nДобровольная уплата алиментов без надлежащего оформления может привести к возникновению спорных ситуаций. Нотариально удостоверенное соглашение об уплате алиментов имеет силу исполнительного листа и позволяет избежать предъявления требований за прошлый период. В отсутствие такого соглашения получатель алиментов вправе в любое время обратиться в суд и потребовать взыскания алиментов за три предшествующих года, если докажет, что Вы уклонялись от их уплаты.",
      options: [      
        { text: "Назад", next: "da_vipl_ali", class: "secondary" },
        { text: "В главное меню", next: "start", class: "secondary" }
      ]
    },
    "net_vipl_ali": {
      text: "Имеется ли решение суда?",
      options: [

    "resh_sud_da_net_vipl": {
      text: "Предупреждение о последствиях неуплаты алиментов при наличии судебного решения.\n \nНеуплата алиментов при наличии вступившего в законную силу решения суда влечет серьезные правовые последствия. Судебный пристав-исполнитель вправе применить следующие меры: арест денежных средств на счетах и имущества, временное ограничение выезда за пределы Российской Федерации, временное ограничение на пользование специальным правом. За злостную неуплату алиментов предусмотрена административная ответственность по статье 5.35.1 КоАП РФ, а при неоднократности нарушения — уголовная ответственность по статье 157 УК РФ.\n \nРекомендуем незамедлительно приступить к погашению образовавшейся задолженности и обратиться к судебному приставу-исполнителю для определения порядка выплат.",
      options: [     
        { text: "Назад", next: "net_vipl_ali", class: "secondary" },

      ]

    "resh_sud_net_net_vipl": {
      text: "Ситуация до обращения в суд.\n \nНа данный момент судебное решение о взыскании алиментов отсутствует, однако риск его вынесения сохраняется. Получатель алиментов вправе обратиться в суд в любое время. Если Вы начнете добровольно уплачивать алименты и заключите нотариально удостоверенное соглашение, это позволит избежать судебного разбирательства и накопления задолженности.\n \nПримите во внимание: при обращении в суд алименты могут быть взысканы за три года, предшествовавших подаче заявления, если будет доказано, что Вы уклонялись от их уплаты.",

    "da_v_sud": {

      options: [

    "net_v_sud": {
      text: "Для взыскания алиментов у Вас есть следующие варианты:\n \n1. <b>Заключить нотариально удостоверенное соглашение об уплате алиментов</b>. Оно имеет силу исполнительного листа, позволяет установить размер, порядок и сроки выплаты. Может быть изменено или расторгнуто по соглашению сторон, через нотариуса или в суде.\n \n2.	<b>Обратиться в суд</b>\n• Если между родителями нет спора об отцовстве (материнстве) и не требуется привлечения третьих лиц – Вы вправе подать заявление о вынесении судебного приказа. Судебный приказ выдаётся мировым судьёй без вызова сторон. Он сам является исполнительным документом (отдельный исполнительный лист не выдаётся).\n• В иных случаях (спор об отцовстве, необходимость привлечения других лиц, на которые плательщиком уплачиваются алименты, требование алиментов в твёрдой сумме) подаётся исковое заявление в мировой (если нет спора об отцовстве) или районный суд.\n \n<b>Разъяснение по видам алиментов:</b>\n• <b>В долях к заработку</b> – если у плательщика регулярный, стабильный доход. Размер: 1/4 – на одного ребёнка, 1/3 – на двоих, 1/2 – на троих и более.\n• <b>В твёрдой денежной сумме</b> – если доход нерегулярный, меняющийся, в натуральной форме или в валюте, либо взыскание в долях невозможно/нарушает интересы ребёнка. Сумма привязана к прожиточному минимуму и подлежит индексации пропорционально его росту.\n \nК заявлению приложите: паспорт, свидетельство о рождении ребёнка, справку о доходах (при наличии), сведения о месте жительства должника. Заявление подаётся по Вашему месту жительства или по месту жительства должника.\n \nПосле получения судебного приказа или решения суда предъявите исполнительный документ в подразделение Федеральной службы судебных приставов по месту жительства должника (или месту нахождения его имущества) либо по месту его работы.\n Исполнительное производство возбуждается на основании исполнительного документа по заявлению взыскателя.\n \n<b>Бесплатная юридическая помощь (БЮП)</b> (по Федеральному закону о Бесплатной юридической помощи):\nВы имеете право на квалифицированную бесплатную помощь по алиментным делам. Контакты адвокатов вашего региона, работающих в системе БЮП, – на сайте Федеральной палаты адвокатов Российской Федерации или в региональной адвокатской палате.",
      options: [ 
        { text: "Перейти на сайт Бесплатной юридической помощи", next: "bespl_ur_pom", class: "gray" },    
        { text: "Назад", next: "vzi_ali", class: "secondary" },
        { text: "В главное меню", next: "start", class: "secondary" },
        { text: "Оценить помощь", next: "rating", class: "rating" }
      ]
    },
    "ne_pol_list": {
      text: "Вам необходимо получить исполнительный лист в суде, вынесшем решение.\n \nДля этого обратитесь в канцелярию того суда (мирового или районного), который рассматривал Ваше дело о взыскании алиментов. При себе необходимо иметь документ, удостоверяющий личность, и копию решения суда/судебного приказа (если имеется).\n \nЕсли решение суда по какой-то причине отсутствует, сначала уточните в суде, было ли оно вынесено и вступило ли в законную силу.",
      options: [
        { text: "", next: "" },       
        { text: "Назад", next: "da_v_sud", class: "secondary" },
        { text: "В главное меню", next: "start", class: "secondary" }

    "da_ne_pred_list": {
      text: "Вам необходимо предъявить исполнительный лист для принудительного исполнения.\n \nВы вправе самостоятельно направить исполнительный лист в бухгалтерию по месту работы должника, если место работы известно.\n \nДля принудительного исполнения через Федеральную службу судебных приставов необходимо подать заявление о возбуждении исполнительного производства. Заявление и исполнительный лист подаются в отдел судебных приставов по месту жительства должника или месту нахождения его имущества. Документы могут быть поданы лично через канцелярию, направлены заказным почтовым отправлением с описью вложения или в электронной форме через портал Госуслуг при наличии усиленной квалифицированной электронной подписи.",

    "net_vipl_bezd_prist": {
      text: "Обжалование бездействия судебного пристава-исполнителя.\n \nВы вправе подать жалобу на бездействие судебного пристава-исполнителя вышестоящему должностному лицу — начальнику отдела — старшему судебному приставу или в органы прокуратуры.\n• Официальный сайт Генеральной прокуратуры РФ: epp.genproc.gov.ru\n• Официальный сайт ФССП России: fssp.gov.ru (раздел «Обращения»)\n• Также Вы вправе обжаловать действия (бездействие) судебного пристава-исполнителя в районный суд\n \n Обращаем внимание: получение информации справочного характера по телефону в ФССП России не предусмотрено. Рекомендуется подавать обращения в письменной форме.\n \nВы также можете обратиться к Уполномоченному по правам ребенка (deti.gov.ru)",

    "net_vipl_ne_ust_prist": {
      text: "Обжалование действий судебного пристава-исполнителя, результат которых Вас не удовлетворяет.\n \nВы вправе обжаловать действия судебного пристава-исполнителя вышестоящему должностному лицу, в органы прокуратуры или в районный суд.\n \n• Официальный сайт Генеральной прокуратуры РФ: epp.genproc.gov.ru\n• Официальный сайт ФССП России: fssp.gov.ru\n \nВнимание: сведения о размере задолженности, отображаемые на сайте ФССП России, носят справочный характер. Официальным документом, подтверждающим размер задолженности, является постановление судебного пристава-исполнителя о расчете задолженности. ",

    "net_vipl_ne_obr_prist": {
      text: "Вам необходимо обратиться к судебному приставу-исполнителю.\n \nПодайте заявление о возбуждении исполнительного производства (если исполнительный лист еще не предъявлен) или ходатайство о применении мер принудительного исполнения к должнику. Обращение может быть подано через официальный сайт <b>ФССП России</b> (fssp.gov.ru, раздел «Интернет-приемная») или лично.\n \nПосле направления обращения рекомендуется контролировать ход исполнительного производства. В случае бездействия судебного пристава-исполнителя Вы вправе обратиться с жалобой в вышестоящий орган или прокуратуру.",

    "net_vipl_izm_razm_ali": {
      text: "Вы вправе обратиться в суд с иском об изменении размера алиментов.\n \nОснования для изменения размера алиментов:\n• изменение потребностей ребенка (например, в связи с состоянием здоровья);\n• изменение уровня дохода должника;\n• рождение у должника других детей;\n• утрата работы или ухудшение материального положения взыскателя;\n• нерегулярный или меняющийся доход должника (основание для установления алиментов в твердой денежной сумме).\n \nИсковое заявление подается в суд, вынесший первоначальное решение. Размер алиментов, взыскиваемых на несовершеннолетних детей в судебном порядке, по общему правилу составляет: на одного ребенка — одну четверть, на двух детей — одну треть, на трех и более детей — половину заработка и (или) иного дохода родителя.",
      options: [

        { text: "В главное меню", next: "start", class: "secondary" }
      ]
    },
    "vzis_ney": {
      text: "Взыскание неустойки за просрочку уплаты алиментов.\n \nВ соответствии со статьей 115 Семейного кодекса РФ, при образовании задолженности по вине лица, обязанного уплачивать алименты, виновное лицо уплачивает получателю алиментов неустойку в размере 0,1% от суммы невыплаченных алиментов за каждый день просрочки.\n \nНеустойка взыскивается в судебном порядке путем подачи отдельного искового заявления. Для расчета суммы неустойки и подготовки искового заявления рекомендуем обратиться за квалифицированной юридической помощью.",

    "docum_2": { text: "Открываю Документ 2...", url: "https://docs.yandex.ru/docs/view?url=ya-disk%3A%2F%2F%2Fdisk%2F%D0%A7%D0%B0%D1%82-%D0%B1%D0%BE%D1%82%2F%D0%A1%D0%BE%D1%86%D0%B8%D0%B0%D0%BB%D1%8C%D0%BD%D1%8B%D0%B9%20%D0%BD%D0%B0%D0%B9%D0%BC%20%D0%B6%D0%B8%D0%BB%D1%8C%D1%8F%2F%D0%9E%D0%B1%D1%80%D0%B0%D0%B7%D1%86%D1%8B%20%D0%B7%D0%B0%D1%8F%D0%B2%D0%BB%D0%B5%D0%BD%D0%B8%D0%B9%2F%D0%90%D0%B4%D0%BC%D0%B8%D0%BD%D0%B8%D1%81%D1%82%D1%80%D0%B0%D1%82%D0%B8%D0%B2%D0%BD%D0%BE%D0%B5%20%D0%B8%D1%81%D0%BA%D0%BE%D0%B2%D0%BE%D0%B5%20%D0%B7%D0%B0%D1%8F%D0%B2%D0%BB%D0%B5%D0%BD%D0%B8%D0%B5.docx&name=%D0%90%D0%B4%D0%BC%D0%B8%D0%BD%D0%B8%D1%81%D1%82%D1%80%D0%B0%D1%82%D0%B8%D0%B2%D0%BD%D0%BE%D0%B5%20%D0%B8%D1%81%D0%BA%D0%BE%D0%B2%D0%BE%D0%B5%20%D0%B7%D0%B0%D1%8F%D0%B2%D0%BB%D0%B5%D0%BD%D0%B8%D0%B5.docx&uid=1130000022164364&nosw=1" },
    "docum_3": { text: "Открываю Документ 3...", url: "https://docs.yandex.ru/docs/view?url=ya-disk%3A%2F%2F%2Fdisk%2F%D0%A7%D0%B0%D1%82-%D0%B1%D0%BE%D1%82%2F%D0%A1%D0%BE%D1%86%D0%B8%D0%B0%D0%BB%D1%8C%D0%BD%D1%8B%D0%B9%20%D0%BD%D0%B0%D0%B9%D0%BC%20%D0%B6%D0%B8%D0%BB%D1%8C%D1%8F%2F%D0%9E%D0%B1%D1%80%D0%B0%D0%B7%D1%86%D1%8B%20%D0%B7%D0%B0%D1%8F%D0%B2%D0%BB%D0%B5%D0%BD%D0%B8%D0%B9%2F%D0%96%D0%B0%D0%BB%D0%BE%D0%B1%D0%B0%20%D0%B2%20%D0%BF%D1%80%D0%BE%D0%BA%D1%83%D1%80%D0%B0%D1%82%D1%83%D1%80%D1%83.docx&name=%D0%96%D0%B0%D0%BB%D0%BE%D0%B1%D0%B0%20%D0%B2%20%D0%BF%D1%80%D0%BE%D0%BA%D1%83%D1%80%D0%B0%D1%82%D1%83%D1%80%D1%83.docx&uid=1130000022164364&nosw=1" },
    "vse_docum": { text: "Открываю папку с документами...", url: "https://disk.yandex.ru/d/UB7qSQSkZGbvKg" },
    "obraz_ali": { text: "Открываю образцы заявлений...", url: "https://disk.yandex.ru/d/KxiCuAWcscC_Ag" },
    "mail_obr": { text: "Создаю письмо по электронной почте...", url: "mailto:obr@deti.gov.ru" },
    "tel_op_upr": { text: "Осуществляю набо по номеру...", url: "tel:+74951325505" },
    "karta_op_upr": { text: "Открываю карту...", url: "https://yandex.ru/maps/org/apparat_upolnomochennogo_pri_prezidente_rf_po_pravam_rebenka/1355267786/?ll=37.592895%2C55.778770&z=16" },
    "obrashenie": { text: "Открываю форму обратной связи...", url: "https://deti.gov.ru/reception/form" },
    "stat_na_sait": { text: "Открываю статью...", url: "https://deti.gov.ru" }
  };

  const chatWindow = document.getElementById('chatWindow');
  const messagesArea = document.getElementById('messagesArea');
  const optionsArea = document.getElementById('optionsArea');
  let isChatOpen = false;
  let isTyping = false;
  let isFirstStart = true;
  let selectedRating = 0;
  let userPath = []; // Путь пользователя по шагам

  function toggleChat() {
    isChatOpen = !isChatOpen;
    chatWindow.classList.toggle('active', isChatOpen);
    document.body.classList.toggle('chat-open', isChatOpen);
    
    if (isChatOpen) {
      if (messagesArea.children.length === 0) {
        runScenario('start');
      }
      // Блокируем прокрутку фона
      window.scrollTo(0, 0);
    }
  }

  function scrollToBottom() {
    if (messagesArea) {
      messagesArea.scrollTop = messagesArea.scrollHeight;
    }
  }

  function addMessage(text, type) {
    if (!messagesArea) return;
    const div = document.createElement('div');
    div.className = 'message ' + type;
    div.innerHTML = text.replace(/\n/g, '<br>');
    messagesArea.appendChild(div);
    scrollToBottom();
  }

  // === SVG ЗВЕЗДА ДЛЯ КНОПКИ ОЦЕНКИ ===
  function getStarIconSVG() {
    return '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle; margin-right: 6px;"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>';
  }

  // === ПЯТИКОНЕЧНАЯ ЗВЕЗДА ===
  function getStarSVG(filled) {
    return '<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">' +
      '<path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" ' +
      (filled ? 'fill="#FFD700" stroke="#FFD700"' : 'fill="#D3D3D3" stroke="#999999" stroke-width="1.5"') + '/>' +
      '</svg>';
  }

  // === КНОПКИ РЕЙТИНГА (5 ЗВЁЗД) ===
  function createRatingButtons() {
    if (!optionsArea) return;
    
    const starsContainer = document.createElement('div');
    starsContainer.className = 'rating-stars';
    
    for (let i = 1; i <= 5; i++) {
      const star = document.createElement('span');
      star.className = 'rating-star';
      star.innerHTML = getStarSVG(false);
      star.setAttribute('data-rating', i);
      star.setAttribute('aria-label', 'Оценка ' + i + ' из 5');
      
      star.addEventListener('mouseenter', function() {
        const allStars = starsContainer.querySelectorAll('.rating-star');
        allStars.forEach((s, idx) => {
          if (idx < i) {
            s.classList.add('active');
            s.innerHTML = getStarSVG(true);
          } else {
            s.classList.remove('active');
            s.innerHTML = getStarSVG(false);
          }
        });
      });
      
      star.addEventListener('mouseleave', function() {
        const allStars = starsContainer.querySelectorAll('.rating-star');
        allStars.forEach((s) => {
          s.classList.remove('active');
          s.innerHTML = getStarSVG(false);
        });
      });
      
      star.addEventListener('click', function() {
        selectedRating = i;
        const allStars = starsContainer.querySelectorAll('.rating-star');
        allStars.forEach((s, idx) => {
          s.classList.toggle('active', idx < i);
          s.innerHTML = getStarSVG(idx < i);
        });
        sendRating(i);
        setTimeout(() => {
          runScenario('rating_submit');
        }, 300);
      });
      
      starsContainer.appendChild(star);
    }
    
    optionsArea.appendChild(starsContainer);
    
    const skipBtn = document.createElement('button');
    skipBtn.className = 'option-btn option-btn-secondary';
    skipBtn.textContent = 'Пропустить';
    skipBtn.onclick = function() { runScenario('start'); };
    optionsArea.appendChild(skipBtn);
  }

  // === ОТПРАВКА ОЦЕНКИ В МЕТРИКУ ===
  function sendRating(rating) {
    console.log('[ОЦЕНКА БОТА] ' + new Date().toLocaleString() + ' - Рейтинг: ' + rating + '/5');
    
    // Отправка в Яндекс.Метрику
    if (typeof ym !== 'undefined') {
      // Цель "Оценка бота"
      ym(109340663, 'reachGoal', 'bot_rating', { 
        rating: rating,
        stars: rating + '_stars',
        url: location.href 
      });
      
      // Параметр для вебвизора
      ym(109340663, 'params', {
        bot_rating: rating,
        rating_stars: rating + '_stars'
      });
    }
    
    // Сохранение локально
    try {
      var storage = window.localStorage;
      if (storage) {
        var ratings = JSON.parse(storage.getItem('bot_ratings')) || [];
        ratings.push({
          timestamp: new Date().toLocaleString(),
          rating: rating,
          url: location.href,
          path: userPath.join(' -> ')
        });
        storage.setItem('bot_ratings', JSON.stringify(ratings));
      }
    } catch(e) {
      console.log('Не удалось сохранить оценку локально');
    }
  }

  // === ОТПРАВКА ШАГА СЦЕНАРИЯ В МЕТРИКУ ===
  function trackScenarioStep(stepId, stepName) {
    console.log('[ШАГ БОТА] ' + new Date().toLocaleString() + ' - Шаг: ' + stepId);
    
    // Добавляем в путь пользователя
    userPath.push(stepId);
    
    if (typeof ym !== 'undefined') {
      // Цель для каждого шага
      ym(109340663, 'reachGoal', 'bot_step', {
        step_id: stepId,
        step_name: stepName || stepId,
        step_number: userPath.length,
        full_path: userPath.join(' > ')
      });
      
      // Параметры для детальной аналитики
      ym(109340663, 'params', {
        current_step: stepId,
        step_name: stepName || stepId,
        total_steps: userPath.length,
        user_path: userPath.join(' > ')
      });
    }
    
    // Сохранение локально
    try {
      var storage = window.localStorage;
      if (storage) {
        var steps = JSON.parse(storage.getItem('bot_steps')) || [];
        steps.push({
          timestamp: new Date().toLocaleString(),
          step_id: stepId,
          step_name: stepName || stepId,
          step_number: userPath.length,
          full_path: userPath.join(' > ')
        });
        storage.setItem('bot_steps', JSON.stringify(steps));
      }
    } catch(e) {
      console.log('Не удалось сохранить шаг');
    }
  }

  // === ПРОВЕРКА: финальный ли это шаг ===
  function isFinalStep(stepId) {
    const finalSteps = [
      'dop_mer_dolzh', 'reg_vipl', 'contakt',
      'notar_sogl_ali', 'dop_lish_rod_prav', 'dop_ali_18', 
      'dop_index', 'dop_bankr', 'dop_prav_dolzh',
      'vzaim_upl_pristav', 'narush_upl_pristav', 'um_razm_ali_upl_pristav',
      'otsroch_upl_pristav', 'otcov_upl_pristav', 'perep_upl_pristav',
      'upl_buh', 'dobrov_vipl_ali', 'resh_sud_da_net_vipl', 'resh_sud_net_net_vipl',
      'ne_pol_list', 'da_ne_pred_list', 'net_vipl_bezd_prist', 'net_vipl_ne_ust_prist',
      'net_vipl_ne_obr_prist', 'net_vipl_izm_razm_ali', 'vzis_ney', 'rozi_dolz',
      'bezd_prist', 'ne_ust_prist', 'ne_obr_prist', 'izm_razm_ali'
    ];
    return finalSteps.indexOf(stepId) !== -1;
  }

  function runScenario(stepId) {
    if (isTyping) return;
    isTyping = true;
    
    var messageText = "";
    
    var step = scenarios[stepId];
    if (!step) {
      addMessage("Произошла ошибка. Попробуйте начать сначала.", 'bot');
      isTyping = false;
      return;
    }

    // Отслеживаем шаг в Метрике
    trackScenarioStep(stepId, step.text ? step.text.substring(0, 50) : stepId);

    if (stepId === 'start') {
      if (isFirstStart) {
        messageText = "Здравствуйте! Я виртуальный помощник Уполномоченного при Президенте Российской Федерации по правам ребенка.\n \n Обращаю внимание, что предоставляемая информация имеет справочный характер и не может рассматриваться в качестве официального ответа на обращение гражданина в контексте Федерального закона № 59-ФЗ.\n \nПожалуйста, выберите интересующий раздел:\n \n<b>На текущий момент доступен только раздел:</b>\n•  <i>Алименты</i>";
        isFirstStart = false;
      } else {
        messageText = "Пожалуйста, выберите интересующий раздел:";
      }
    } else {
      messageText = step.text;
    }

    setTimeout(function() {
      addMessage(messageText, 'bot');
      if (optionsArea) optionsArea.innerHTML = '';
      
      // === ВНЕШНИЕ ССЫЛКИ — СРАЗУ ОТКРЫВАЕМ САЙТ ===
      if (step.url) {
        // Сразу открываем сайт
        window.open(step.url, '_blank');
        
        // Отслеживаем переход
        if (typeof ym !== 'undefined') {
          ym(109340663, 'reachGoal', 'bot_external_link', {
            step_id: stepId,
            url: step.url
          });
        }
        
        // Показываем кнопки "В главное меню" и "Оценить помощь"
        var btnMenu = document.createElement('button');
        btnMenu.className = 'option-btn option-btn-secondary';
        btnMenu.textContent = 'В главное меню';
        btnMenu.onclick = function() {
          if (optionsArea) optionsArea.innerHTML = '';
          runScenario('start');
        };
        if (optionsArea) optionsArea.appendChild(btnMenu);
        
        // Кнопка оценки с иконкой звезды
        var ratingBtn = document.createElement('button');
        ratingBtn.className = 'option-btn option-btn-rating';
        ratingBtn.innerHTML = getStarIconSVG() + 'Оценить помощь';
        ratingBtn.onclick = function() { runScenario('rating'); };
        if (optionsArea) optionsArea.appendChild(ratingBtn);
        
        setTimeout(scrollToBottom, 100);
        isTyping = false;
        return;
      }

      // === РЕЙТИНГ ===
      if (step.isRating) {
        createRatingButtons();
        setTimeout(scrollToBottom, 100);
        isTyping = false;
        return;
      }

      // === ОБЫЧНЫЕ КНОПКИ ===
      if (step.options && step.options.length > 0) {
        step.options.forEach(function(opt, index) {
          if (opt.text === '') {
            var separator = document.createElement('div');
            separator.style.cssText = 'flex-basis: 100%; height: 0;';
            if (optionsArea) optionsArea.appendChild(separator);
            return;
          }
          
          var btn = document.createElement('button');
          btn.className = 'option-btn';
          
          if (opt.class === 'secondary') {
            btn.classList.add('option-btn-secondary');
            btn.textContent = opt.text;
          } else if (opt.class === 'outline') {
            btn.classList.add('option-btn-outline');
            btn.textContent = opt.text;
          } else if (opt.class === 'gray') {
            // НОВЫЙ СТИЛЬ: серая кнопка с иконкой ссылки СЛЕВА
            btn.classList.add('option-btn-gray');
            btn.innerHTML = getExternalLinkIconSVG() + opt.text;
          } else if (opt.class === 'rating') {
            btn.classList.add('option-btn-rating');
            btn.innerHTML = getStarIconSVG() + opt.text;
          } else {
            btn.textContent = opt.text;
          }
          
          btn.style.animationDelay = (index * 0.05) + 's';
          btn.onclick = (function(o) {
            return function() { handleUserChoice(o); };
          })(opt);
          
          if (optionsArea) optionsArea.appendChild(btn);
        });
      }

      // === АВТОМАТИЧЕСКОЕ ДОБАВЛЕНИЕ КНОПКИ ОЦЕНКИ В ФИНАЛЬНЫХ ШАГАХ ===
      if (isFinalStep(stepId)) {
        var hasRating = step.options && step.options.some(function(o) { return o.next === 'rating'; });
        if (!hasRating) {
          var autoRatingBtn = document.createElement('button');
          autoRatingBtn.className = 'option-btn option-btn-rating';
          autoRatingBtn.innerHTML = getStarIconSVG() + 'Оценить помощь';
          autoRatingBtn.onclick = function() { runScenario('rating'); };
          var allBtns = optionsArea.querySelectorAll('.option-btn');
          autoRatingBtn.style.animationDelay = (allBtns.length * 0.05) + 's';
          if (optionsArea) optionsArea.appendChild(autoRatingBtn);
        }
      }

      setTimeout(scrollToBottom, 100);
      isTyping = false;
    }, 400);
  }

  function handleUserChoice(option) {
    if (isTyping) return;

    const nextStep = scenarios[option.next];
    
    // Если это внешняя ссылка (есть url)
    if (nextStep && nextStep.url) {
      addMessage(nextStep.text, 'bot');
      window.open(nextStep.url, '_blank');
      scrollToBottom();
      
      console.log('[СТАТИСТИКА БОТА] Внешняя ссылка: ' + option.text + ' -> ' + nextStep.url);
      if (typeof ym !== 'undefined') {
        ym(109340663, 'reachGoal', 'chatbot_click', {
          button_text: option.text,
          next_step: option.next,
          is_external: true,
          url: nextStep.url
        });
      }
      return;
    }

    console.log('[СТАТИСТИКА БОТА] ' + new Date().toLocaleString() + ' - Выбрано: "' + option.text + '" -> Следующий шаг: "' + option.next + '"');
    
    // Отслеживание клика по кнопке
    if (typeof ym !== 'undefined') {
      ym(109340663, 'reachGoal', 'chatbot_click', {
        button_text: option.text,
        next_step: option.next,
        current_path: userPath.join(' > ')
      });
    }
    
    try {
      var storage = window.localStorage;
      if (storage) {
        var stats = JSON.parse(storage.getItem('chatbot_stats')) || [];
        stats.push({
          timestamp: new Date().toLocaleString(),
          text: option.text,
          nextStep: option.next,
          path: userPath.join(' > ')
        });
        storage.setItem('chatbot_stats', JSON.stringify(stats));
      }
    } catch(e) {
      console.log('Не удалось сохранить статистику');
    }

    var userDiv = document.createElement('div');
    userDiv.className = 'message user';
    userDiv.innerHTML = option.text;
    if (messagesArea) messagesArea.appendChild(userDiv);
    
    scrollToBottom();
    
    if (optionsArea) optionsArea.innerHTML = '';
    runScenario(option.next);
    
    if (typeof gtag !== 'undefined') {
      gtag('event', 'chatbot_click', {
        'event_category': 'engagement',
        'event_label': option.next,
        'value': 1
      });
    }
  }

  // === ИНИЦИАЛИЗАЦИЯ ===
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', function() {
      console.log('Бот инициализирован с полной аналитикой');
    });
  } else {
    console.log('Бот инициализирован с полной аналитикой');
  }
</script>
